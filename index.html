<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Hypnotists</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;500;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  overflow-x: hidden;
  background: #05060a;
  color: white;
}

/* ===================== BACKGROUND ===================== */

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(0,140,255,0.25), transparent 40%),
    radial-gradient(circle at 85% 30%, rgba(0,255,200,0.12), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(120,0,255,0.18), transparent 50%);
  filter: blur(70px);
  animation: floatGlow 12s ease-in-out infinite alternate;
  z-index: -3;
}

@keyframes floatGlow {
  0% { transform: scale(1) translateY(0px); }
  100% { transform: scale(1.1) translateY(40px); }
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(120,180,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,180,255,0.05) 1px, transparent 1px);
  background-size: 80px 80px;
  animation: gridMove 30s linear infinite;
  z-index: -2;
  opacity: 0.4;
}

@keyframes gridMove {
  from { transform: translateY(0); }
  to { transform: translateY(80px); }
}

canvas {
  position: fixed;
  inset: 0;
  z-index: -1;
}

/* ===================== HEADER ===================== */

header {
  text-align: center;
  padding: 140px 20px 60px;
}

header h1 {
  font-size: 76px;
  font-weight: 800;
  background: linear-gradient(90deg,#4aa3ff,#00e1ff,#8a5bff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  color: #b6c7d9;
  margin-top: 10px;
}

/* ===================== SECTIONS ===================== */

.section {
  min-height: 65vh;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 60px;
  padding: 60px 10%;
  position: relative;
}

/* glass card */
.card {
  display: flex;
  align-items: center;
  gap: 50px;
  padding: 30px;
  border-radius: 25px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(100,180,255,0.2);
  box-shadow: 0 0 60px rgba(0,140,255,0.12);
}

/* images */
.char {
  width: 260px;
  height: 260px;
  object-fit: contain;
  border-radius: 22px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(100,180,255,0.25);
  box-shadow: 0 0 50px rgba(74,163,255,0.15);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.char:hover {
  transform: scale(1.05);
}

/* 🔥 JAX BIGGER (SAFE METHOD) */
.jax {
  transform: scale(1.4);
  transform-origin: center;
  margin-right: 40px;
}

/* text */
.text h2 {
  font-size: 38px;
  color: #7cc7ff;
}

.text p {
  margin-top: 10px;
  color: #b8cbe0;
  line-height: 1.7;
}

/* responsive */
@media (max-width: 768px) {
  .card {
    flex-direction: column;
    text-align: center;
  }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<header>
  <h1>The Hypnotists</h1>
  <p>Reality is a controlled illusion layer.</p>
</header>

<!-- JAX -->
<div class="section">
  <div class="card">
    <img class="char jax" src="jax.png" />
    <div class="text">
      <h2>Jax Opus</h2>
      <p>A disruption architect who bends probability itself.</p>
    </div>
  </div>
</div>

<!-- ELIAS -->
<div class="section">
  <div class="card">
    <img class="char" src="elias.png" />
    <div class="text">
      <h2>Dr. Elias Mako</h2>
      <p>A cognitive systems researcher who rewrites perception.</p>
    </div>
  </div>
</div>

<!-- TOMMY -->
<div class="section">
  <div class="card">
    <img class="char" src="tommy.png" />
    <div class="text">
      <h2>Tommy</h2>
      <p>The anomaly — unpredictable and outside control.</p>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = Array.from({length: 60}, () => ({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height,
  r: Math.random()*2,
  dx: (Math.random()-0.5)*0.3,
  dy: (Math.random()-0.5)*0.3
}));

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.fillStyle="rgba(120,180,255,0.5)";
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });
  requestAnimationFrame(draw);
}
draw();

window.addEventListener("resize", () => {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
});
</script>

</body>
</html>
