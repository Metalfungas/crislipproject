<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Hypnotists</title>
<link rel="icon" href="hotsmp.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  background:black;
  color:white;
  overflow-x:hidden;
}

/* ================= GALAXY CANVAS ================= */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

#bg{z-index:-3;}
#stars{z-index:-2;}
#particles{z-index:-1;}

/* ================= HERO ================= */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:4rem;
  opacity:0;
  animation:fadeUp 1s forwards;
}

.hero p{
  margin-top:10px;
  opacity:0;
  animation:fadeUp 1.3s forwards;
}

button{
  margin-top:25px;
  padding:12px 28px;
  border:none;
  border-radius:999px;
  background:linear-gradient(90deg,#6a00ff,#00d4ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.08);
  box-shadow:0 0 25px rgba(0,200,255,0.4);
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* ================= CHARACTERS ================= */
.section{
  padding:120px 20px;
}

.section h2{
  text-align:center;
  font-size:2.5rem;
  margin-bottom:60px;
}

.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:40px;
}

.card{
  width:260px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  opacity:0;
  transform:translateY(40px);
  transition:1s;
  text-align:center;
}

.card img{
  width:100%;
  height:240px;
  object-fit:contain;
}

.card h3{
  margin-top:10px;
}

.card p{
  font-size:0.9rem;
  opacity:0.7;
  margin-top:8px;
}

.show{
  opacity:1 !important;
  transform:translateY(0) !important;
}

footer{
  text-align:center;
  padding:50px;
  opacity:0.4;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="stars"></canvas>
<canvas id="particles"></canvas>

<div class="hero">
  <h1>The Hypnotists</h1>
  <p>Gordon Korman • Cinematic Project</p>
  <button onclick="document.getElementById('characters').scrollIntoView({behavior:'smooth'})">Enter</button>
</div>

<div class="section" id="characters">
  <h2>Characters</h2>
  <div class="cards">

    <div class="card reveal">
      <img src="jax.png" alt="Jax">
      <h3>Jax Opus</h3>
      <p>Mysterious hypnotic abilities.</p>
    </div>

    <div class="card reveal">
      <img src="elias.png" alt="Elias">
      <h3>Dr. Elias Mako</h3>
      <p>Dangerous mind experiment scientist.</p>
    </div>

    <div class="card reveal">
      <img src="tommy.png" alt="Tommy">
      <h3>Tommy</h3>
      <p>Loyal friend caught in chaos.</p>
    </div>

  </div>
</div>

<footer>GitHub Pages Ready • Galaxy Build</footer>

<script>

const bg = document.getElementById("bg");
const starsCanvas = document.getElementById("stars");
const particlesCanvas = document.getElementById("particles");

const b = bg.getContext("2d");
const s = starsCanvas.getContext("2d");
const p = particlesCanvas.getContext("2d");

function resize(){
  bg.width = starsCanvas.width = particlesCanvas.width = innerWidth;
  bg.height = starsCanvas.height = particlesCanvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ================= NEBULA ================= */
function nebula(){
  let t = Date.now()*0.00003;

  b.globalCompositeOperation = "source-over";
  b.fillStyle = "rgba(0,0,0,0.15)";
  b.fillRect(0,0,bg.width,bg.height);

  let x1 = innerWidth/2 + Math.cos(t)*300;
  let y1 = innerHeight/2 + Math.sin(t)*200;

  let x2 = innerWidth*0.3 + Math.sin(t*1.3)*250;
  let y2 = innerHeight*0.7 + Math.cos(t*1.1)*250;

  let g = b.createRadialGradient(x1,y1,0,x1,y1,innerWidth*0.8);
  g.addColorStop(0,"rgba(140,0,255,0.18)");
  g.addColorStop(0.3,"rgba(0,180,255,0.10)");
  g.addColorStop(0.6,"rgba(255,0,150,0.06)");
  g.addColorStop(1,"transparent");

  b.fillStyle = g;
  b.fillRect(0,0,bg.width,bg.height);

  let g2 = b.createRadialGradient(x2,y2,0,x2,y2,innerWidth);
  g2.addColorStop(0,"rgba(0,255,200,0.08)");
  g2.addColorStop(1,"transparent");

  b.fillStyle = g2;
  b.fillRect(0,0,bg.width,bg.height);

  b.globalCompositeOperation = "lighter";
}
/* ================= STARS ================= */
let stars = [];
for(let i=0;i<400;i++){
  stars.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    r:Math.random()*1.5
  });
}

function drawStars(){
  s.clearRect(0,0,starsCanvas.width,starsCanvas.height);

  for(let st of stars){
    s.beginPath();
    s.arc(st.x,st.y,st.r,0,Math.PI*2);
    s.fillStyle="white";
    s.fill();

    st.y += 0.3;
    if(st.y > innerHeight){
      st.y = 0;
      st.x = Math.random()*innerWidth;
    }
  }
}

/* ================= PARTICLES ================= */
let parts = [];
for(let i=0;i<120;i++){
  parts.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5
  });
}

function drawParticles(){
  p.clearRect(0,0,particlesCanvas.width,particlesCanvas.height);

  for(let pt of parts){
    p.beginPath();
    p.arc(pt.x,pt.y,2,0,Math.PI*2);
    p.fillStyle="rgba(255,255,255,0.4)";
    p.fill();

    pt.x += pt.vx;
    pt.y += pt.vy;

    if(pt.x<0) pt.x=innerWidth;
    if(pt.x>innerWidth) pt.x=0;
    if(pt.y<0) pt.y=innerHeight;
    if(pt.y>innerHeight) pt.y=0;
  }
}

function animate(){
  nebula();
  drawStars();
  drawParticles();
  requestAnimationFrame(animate);
}
animate();

/* ================= REVEAL ================= */
const obs = new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add("show");
  });
});

document.querySelectorAll(".reveal").forEach(el=>obs.observe(el));

</script>

</body>
</html>
