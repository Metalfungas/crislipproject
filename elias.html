<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tommy | The Hypnotists</title>

<link rel="icon" href="hotsmp.ico">
<link rel="stylesheet" href="style.css">

<style>
  body {
    margin: 0;
    color: white;
    background: black;
    font-family: Inter, Arial, sans-serif;
    overflow-x: hidden;
  }

  /* BACK BUTTON */
  .back {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
    text-decoration: none;

    color: white;
    padding: 10px 16px;
    border-radius: 999px;

    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);

    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    transition: 0.2s ease;
  }

  .back:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.10);
  }

  /* PAGE WRAPPER */
  .character-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
  }

  /* GLASS CARD */
  .content {
    display: flex;
    gap: 30px;
    align-items: center;
    max-width: 900px;

    padding: 30px;
    border-radius: 26px;

    background: rgba(10,10,10,0.72);
    border: 1px solid rgba(255,255,255,0.14);

    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  .content img {
    width: 240px;
    height: 320px;
    object-fit: cover;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.12);
  }

  h3 {
    margin: 0 0 10px;
    font-size: 2rem;
  }

  p {
    color: rgba(255,255,255,0.75);
    line-height: 1.7;
    max-width: 420px;
  }

  /* MOBILE */
  @media (max-width: 800px) {
    .content {
      flex-direction: column;
      text-align: center;
    }

    .content img {
      width: 80%;
      height: auto;
    }
  }
</style>

</head>

<body>

<!-- 🌌 YOUR EXISTING BACKGROUND -->
<canvas id="bg"></canvas>
<canvas id="stars"></canvas>
<canvas id="particles"></canvas>

<!-- 🔙 BACK BUTTON -->
<a class="back" href="index.html">← Back</a>

<!-- 👤 CHARACTER CONTENT -->
<div class="character-page">

  <div class="content">

    <img src="elias.png" alt="Dr elias mako">

    <div>
      <h3>Dr mako</h3>
      <p>
        The villain in the story. decides to use jax's power for the worst.
      </p>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
