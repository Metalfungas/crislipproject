<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: white;
  }

  .app {
    display: flex;
    height: 100vh;
  }

  .sidebar {
    width: 200px;
    background: #11131a;
    padding: 15px;
  }

  .chat {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 15px;
    background: #151823;
    border-bottom: 1px solid #222;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
  }

  .msg {
    margin-bottom: 10px;
    padding: 8px;
    background: #1b1f2a;
    border-radius: 8px;
  }

  .name {
    font-weight: bold;
    color: #7aa2ff;
    margin-right: 5px;
  }

  .input {
    display: flex;
    padding: 10px;
    background: #151823;
    border-top: 1px solid #222;
    gap: 5px;
  }

  input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #222736;
    color: white;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    background: #4c7dff;
    color: white;
    cursor: pointer;
  }
</style>

</head>
<body>

<div class="app">

  <div class="sidebar">
    <h3>Global</h3>
    <p># general</p>
  </div>

  <div class="chat">

    <div class="header">
      <h3># general</h3>
    </div>

    <div id="messages"></div>

    <div class="input">
      <input id="nickname" placeholder="nickname" />
      <input id="message" placeholder="message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  // 🔥 YOUR FIREBASE CONFIG (you already have this)
  const firebaseConfig = {
    apiKey: "AIzaSyAYEUWClZTftqzrAM1Y7MK3ZIuDvFOBRh4",
    authDomain: "chat-97f6b.firebaseapp.com",
    projectId: "chat-97f6b",
    storageBucket: "chat-97f6b.firebasestorage.app",
    messagingSenderId: "731606719742",
    appId: "1:731606719742:web:c98ed97777eb33e09d99af"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const messagesDiv = document.getElementById("messages");

  // 💬 live messages
  db.collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {
      messagesDiv.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "msg";

        div.innerHTML = `
          <span class="name">${data.name}:</span>
          <span>${data.text}</span>
        `;

        messagesDiv.appendChild(div);
      });

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

  // 📤 send message
  function sendMessage() {
    const name = document.getElementById("nickname").value || "anon";
    const text = document.getElementById("message").value;

    if (!text) return;

    db.collection("messages").add({
      name,
      text,
      time: Date.now()
    });

    document.getElementById("message").value = "";
  }
</script>

</body>
</html>
